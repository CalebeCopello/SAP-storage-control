# ── Reverse Proxy ────────────────────────────────────────────────────────────
# This Nginx sits in front of everything and routes by URL path:
#
#   /api/*   →  backend:8080   (Spring Boot REST API)
#   /*       →  frontend:80    (Angular SPA)
#
# Docker's internal DNS resolves container names automatically within
# the shared network defined in docker-compose.yml.

server {
    listen 80;
    server_name localhost;

    # ── API traffic ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8080;

        # Forward the real client IP and host so Spring Boot logs are useful
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — increase if you have long-running endpoints
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Frontend traffic ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    # Compresses JS/CSS/JSON responses before sending to the browser.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}