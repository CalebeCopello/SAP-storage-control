<mat-card class="user-register-card">
  <mat-card-header>
    <mat-card-title>Criar uma conta</mat-card-title>
    <mat-card-subtitle>Preencha o formulário para criar sua conta</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
          <mat-label>Nome</mat-label>
          <input matInput formControlName="name" placeholder="João da Silva" />
          <mat-icon matSuffix>person</mat-icon>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" placeholder="joao.silva@gmail.com" />
          <mat-icon matSuffix>email</mat-icon>
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input matInput formControlName="password" type="password" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label>Confirmar senha</mat-label>
          <input matInput formControlName="confirmPassword" type="password" />
        </mat-form-field>
        <button mat-raised-button color="primary" type="submit">
          Register
        </button>
    </form>
  </mat-card-content>
</mat-card>
