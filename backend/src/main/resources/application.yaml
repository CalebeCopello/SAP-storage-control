spring:
  application:
    name: storage-control

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway manages the schema, not Hibernate
    show-sql: false             # flip to true if you want to see queries in logs
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway — runs migrations automatically on startup
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

# Actuator — exposes /actuator/health for the Docker healthcheck
management:
  endpoints:
    web:
      exposure:
        include: health,info